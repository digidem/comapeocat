name: release

on:
  workflow_dispatch:
    inputs:
      semver:
        description: 'The semver to use'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
          - prerelease
          # - prepatch
          # - preminor
          # - premajor
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    if: ${{github.event_name != 'pull_request' || github.event.pull_request.merged}}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: nearform-actions/optic-release-automation-action@a2785548e8bdafab7e628c2317b604278e460434 # v4.12.2
        with:
          commit-message: 'chore: release {version}'
          sync-semver-tags: false
          access: 'public'
          semver: ${{ github.event.inputs.semver }}
          # Don't notify linked issues
          notify-linked-issues: false
          publish-mode: oidc
          build-command: |
            npm ci

  # On a successful publish (optic publishes when its release PR merges into
  # main), tell downstream repos to fast-track the bump of this package, rather
  # than waiting for their daily Dependabot run. Receiver: digidem/comapeo-core-react-native.
  notify-downstream:
    needs: release
    if: >-
      needs.release.result == 'success' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        downstream:
          - owner: digidem
            repo: comapeo-core-react-native
    steps:
      - uses: actions/create-github-app-token@v3
        id: token
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: ${{ matrix.downstream.owner }}
          repositories: ${{ matrix.downstream.repo }}
      - env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          gh api repos/${{ matrix.downstream.owner }}/${{ matrix.downstream.repo }}/dispatches \
            -f event_type=first-party-release \
            -f 'client_payload[package]=comapeocat'
